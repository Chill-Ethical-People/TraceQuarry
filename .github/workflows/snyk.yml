name: Snyk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "43 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  open-source:
    name: Open Source dependencies
    # GitHub does not provide repository secrets to pull requests from forks.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install production dependencies
        run: python -m pip install --requirement requirements.txt
      - name: Install Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
      - name: Test dependencies for known vulnerabilities
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >-
          snyk test
          --file=requirements.txt
          --package-manager=pip
          --severity-threshold=low
      - name: Monitor the main dependency baseline
        if: github.event_name != 'pull_request'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: >-
          snyk monitor
          --file=requirements.txt
          --package-manager=pip
          --project-name=TraceQuarry
          --target-reference=main
          --remote-repo-url=https://github.com/Chill-Ethical-People/TraceQuarry
