name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development tools
        run: python -m pip install --upgrade pip build twine
      - name: Install TraceQuarry
        run: python -m pip install -e '.[dev]'
      - name: Reject evidence and workstation metadata
        run: python tools/check_repository_hygiene.py
      - name: Check Python quality
        run: |
          ruff check uac_parser tests tools
          ruff format --check uac_parser tests tools
          mypy uac_parser
          bandit -q -c pyproject.toml -r uac_parser
      - name: Run regression suite
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report
      - name: Validate Agent Skill
        run: |
          python -m unittest discover -s tests -p 'test_agent_skill.py' -v
          python tools/package_agent_skill.py --output /tmp/tracequarry-skill.zip
      - name: Audit Python dependencies
        run: pip-audit . --strict --progress-spinner off
      - name: Build distributions
        run: python -m build
      - name: Validate distribution metadata
        run: python -m twine check dist/*
      - name: Validate installed wheel and packaged resources
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd "$RUNNER_TEMP"
          tracequarry --help
          tracequarry-web --help
          tracequarry-rules
          python -c "from uac_parser.enrich.rule_registry import load_registry; assert load_registry()['metadata']['schema_version'] == '1.1'"
          python -c "from uac_parser.resources import resource_file; assert resource_file('assets', 'cep-mark.svg').is_file()"
