name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
      - name: Test and build
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python tools/check_repository_hygiene.py
          ruff check uac_parser tests tools
          ruff format --check uac_parser tests tools
          mypy uac_parser
          bandit -q -c pyproject.toml -r uac_parser
          coverage run -m unittest discover -s tests -v
          coverage report
          pip-audit . --strict --progress-spinner off
          python -m build
          python -m twine check dist/*
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/tracequarry-${{ github.ref_name }}.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate checksums
        working-directory: dist
        run: sha256sum tracequarry-* > SHA256SUMS
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_flags=()
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            release_flags+=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" dist/* \
            --generate-notes \
            --verify-tag \
            "${release_flags[@]}"
