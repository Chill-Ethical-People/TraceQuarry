tag_namespaces:
  tool: "Concrete tool, binary, package, service, or command literal."
  ttp: "Observed behavior pattern or analytic rule."
  attack: "MITRE ATT&CK technique or sub-technique."
  actor_similarity: "Non-attribution profile overlap."
  timesketch: "Recommended label/search metadata for Timesketch export."

tool_tags:
  rclone:
    namespace: tool
    category: exfiltration
    confidence_when_matched: high
    match_literals: ["rclone"]
    suspicious_arguments:
      - "copy"
      - "sync"
      - "move"
      - "serve"
      - "config"
      - "--config"
      - "--transfers"
      - "--bwlimit"
      - "--ignore-existing"
      - "remote:"
    related_ttps: ["ttp.exfil_tool_usage", "ttp.cloud_storage_exfiltration", "ttp.file_discovery_for_exfiltration"]
    mitre: ["T1567.002", "T1048.002", "T1048.003", "T1030", "T1560.001", "T1083"]
    timesketch_labels: ["tool.rclone", "attack.T1567.002", "tracequarry.exfil"]
    source_refs: ["mitre_rclone", "rclone_project"]
    analyst_note: "Legitimate backup/sync tool. High signal when observed with unusual config paths, cloud remotes, staging directories, or after archive creation."

  megacmd:
    namespace: tool
    category: exfiltration
    confidence_when_matched: high
