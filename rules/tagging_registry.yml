timesketch_export:
  event_fields:
    mandatory:
      datetime: "UTC timestamp from TraceQuarry event."
      timestamp_desc: "TraceQuarry timestamp basis, such as log_time, parsed_time, correlated_bodyfile_time."
      message: "Human-readable event summary."
    recommended_extra_fields:
      - tracequarry_event_id
      - tracequarry_collection_id
      - tracequarry_collection_host
      - hostname
      - source_short
      - source_path
      - source_type
      - raw_line
      - severity
      - tool_tags
      - ttp_tags
      - mitre_attack_techniques
      - mitre_attack_tactics
      - actor_similarity_profiles
      - actor_similarity_warning
  label_rules:
    tool_tags: "Export as tool.<name>"
    ttp_tags: "Export as ttp.<name>"
    mitre: "Export as attack.<technique_id>"
    severity: "Export as tracequarry.<severity>"
    actor_similarity: "Export as actor_similarity.<profile_id> only when confidence threshold is met."
  saved_search_templates:
    - name: "TraceQuarry: High severity Linux findings"
      query: 'severity:("high" OR "critical") OR label:"tracequarry.high" OR label:"tracequarry.critical"'
    - name: "TraceQuarry: SSH brute force to success"
      query: 'label:"ttp.ssh_bruteforce" OR label:"ttp.success_after_failures"'
    - name: "TraceQuarry: Exfiltration tooling"
      query: 'label:"tracequarry.exfil" OR label:"tool.rclone" OR label:"tool.megacmd"'
    - name: "TraceQuarry: Remote access tooling"
      query: 'label:"attack.T1219" OR label:"tracequarry.remote_access"'
    - name: "TraceQuarry: Persistence"
      query: 'label:"ttp.cron_persistence" OR label:"ttp.systemd_persistence" OR label:"ttp.ssh_authorized_key"'
    - name: "TraceQuarry: Actor similarity review"
      query: 'label:"actor_similarity.*"'
