# TraceQuarry tagging registry
#
# Purpose:
#   Externalized tag definitions for Linux UAC timeline enrichment, Timesketch
#   export, and analyst review.
#
# Core principle:
#   Tooling and TTP tags may be applied strongly when the evidence matches.
#   Actor entries are similarity profiles only. They must never be rendered as
#   attribution without independent CTI, infrastructure, malware, victimology,
#   and investigation corroboration.
#
# Status:
#   Runtime registry. TraceQuarry validates and loads tool_tags for event
#   enrichment; behavioral correlations remain implemented in Python.

metadata:
  schema_version: "1.0"
  registry_name: tracequarry_linux_tagging_registry
  created: "2026-07-01"
  owner: "Chill Ethical People"
  license: "Apache-2.0"
  default_platforms: ["linux", "unix", "cloud", "container"]
  attribution_policy:
    tooling_and_ttp: "strong_tag_when_source_evidence_matches"
    actor_similarity: "profile_similarity_only"
    forbidden_claims:
      - "Do not state that a named actor conducted the intrusion from this registry alone."
      - "Do not infer lateral movement unless outbound access from one parsed host to another parsed host is observed."
      - "Do not treat strings found inside defensive grep/rg/search commands as execution."
    required_actor_similarity_wording: "Activity overlaps with this profile. This is not attribution."
  source_priority:
    - "MITRE ATT&CK group/software/technique pages"
    - "Government advisories"
    - "Primary vendor threat reports"
    - "DFIR case reports and tool documentation"

