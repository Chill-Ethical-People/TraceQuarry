# Reference rules for the UAC timeline parser. The MVP uses equivalent built-in
# standard-library rules so it can run without PyYAML; this file is for analyst
# review and future externalized loading.
download_execute:
  mitre: [T1105, T1059.004]
  severity: high
  patterns:
    - 'curl .*\\|\\s*(bash|sh)'
    - 'wget .*\\|\\s*(bash|sh)'
    - 'base64 .*\\|\\s*(bash|sh)'
execution_from_tmp:
  mitre: [T1059.004]
  severity: medium
  patterns:
    - '(/tmp|/var/tmp|/dev/shm|/run)/[^ ]+'
credential_access:
  mitre: [T1552.001, T1003.008]
  severity: high
  patterns:
    - '/etc/shadow'
    - 'id_rsa'
    - 'id_ed25519'
    - '.aws/credentials'
    - '.kube/config'

